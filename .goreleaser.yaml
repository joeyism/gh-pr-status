version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
    binary: gh-pr-status

archives:
  - formats:
      - binary
    # Must end with {os}-{arch} — gh extension install uses strings.HasSuffix to find the right asset
    name_template: "gh-pr-status_{{ .Tag }}_{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore"
      - "^test"
      - "Merge pull request"
      - "Merge branch"

release:
  footer: |
    ## Installation

    ```bash
    gh extension install joeyism/gh-pr-status
    ```

    ## Upgrade

    ```bash
    gh extension upgrade pr-status
    ```
